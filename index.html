<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Formulario estático oculto: le permite a Netlify detectar y registrar
         el form "contacto" en build time, ya que el real se renderiza por JS. -->
    <form name="contacto" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="nombre" />
      <input type="email" name="email" />
      <input type="tel" name="telefono" />
      <textarea name="mensaje"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
